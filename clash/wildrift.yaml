  - DOMAIN-SUFFIX,riotgames.zendesk.com

  # ==== [精准 IP 段] ====
  - IP-CIDR,104.160.128.0/17,no-resolve
  - IP-CIDR,162.249.72.0/21,no-resolve
  - IP-CIDR,192.64.168.0/21,no-resolve
  - IP-CIDR,172.65.192.0/18,no-resolve
  - IP-CIDR,15.177.0.0/18,no-resolve
  - IP-CIDR,151.106.246.0/23,no-resolve
  - IP-CIDR,151.106.248.0/22,no-resolve
  - IP-CIDR,151.106.252.0/22,no-resolve
