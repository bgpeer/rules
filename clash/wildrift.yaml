  - DOMAIN-SUFFIX,riot.com
  - DOMAIN-SUFFIX,rgpub.io
  - DOMAIN-SUFFIX,rdatasrv.net
  - DOMAIN-SUFFIX,auth.riotgames.com
  - DOMAIN-SUFFIX,account.riotgames.com
  - DOMAIN-SUFFIX,api.riotgames.com
  - DOMAIN-SUFFIX,entitlements.auth.riotgames.com
  - DOMAIN-SUFFIX,clientconfig.rpg.riotgames.com
  # 地区边缘节点 (不同区域登录加速)
  - DOMAIN-SUFFIX,edge.rms.si.riotgames.com
  - DOMAIN-SUFFIX,riot-geo.pas.si.riotgames.com

  # ==== [游戏内服务] (商城、好友、语音) ====
